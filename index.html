<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Style 1</title>
</head>

<body>
  <section id="ownthing">
    <div class="article">growth</div>
    <div class="article">saturation</div>
    <div class="article">icebreeze</div>
    <button class="button">Gradient Background</button>
    
    
    <script>

      function getDebugInfo() {
        return ({
          width: window.innerWidth,
          height: window.innerHeight,
          dpr: window.devicePixelRatio,
          screenWidth: screen.width,
          screenHeight: screen.height
        });
      }
      
      console.table(getDebugInfo());
      window.addEventListener('resize', () => {
        console.table(getDebugInfo());
      });

    </script>

  </section>
  
  <div class="dialog-wrapper">
    
    <div class="center">
      <button class="open-popup">Open Popup</button>
    </div>

    <div class="popup" id="popup">
      <div class="overlay"></div>
      <div class="popup-content">
        <h2>large-text</h2>
        <p>long-small-text</p>
        <div class="controls">
          <button class="close-btn">Close</button>
          <button class="submit-btn">Submit</button>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
